<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/homePage.css"> 
    <title>登录</title>
    <style>
        .login-box {
            padding:30px;
            text-align:center;
        }
        .login-box .avatar {
            width:100px;
            height:100px;
            border-radius:50%;
            background:#ccc;
            margin:0 auto 20px;
        }
        .login-box input {
            width:100%;
            padding:15px;
            margin:10px 0;
            border:1px solid #eee;
            border-radius:5px;
            font-size:16px;
        }
        .login-box button {
            width:100%;
            background:#007bff;
            color:white;
            border:none;
            padding:15px;
            border-radius:5px;
            font-size:18px;
            margin-top:10px;
        }
    </style>
</head>
<body>
    <header>
        <p>登录</p>
    </header>

    <div class="login-box">
        <div class="avatar">
            <img src="../img/avatar.png" alt="头像" style="width:100%; height:100%; border-radius:50%;">
        </div>
        <input type="text" value="admin" readonly>
        <input type="password" value="*****" readonly>
        <button onclick="location.href='index.html'">登录</button>
    </div>
</body>
</html>
